rt com.looker.kenko.data.mapper.toEntity'; $content = $content -replace 'import com\\.looker\\.kenko\\.data\\.local\\.model\\.toExternal', 'import com.looker.kenko.data.mapper.toExternal'; $content = $content -replace 'import com\\.looker\\.kenko\\.domain\\.model\\.toEntity', 'import com.looker.kenko.data.mapper.toEntity'; $content = $content -replace 'import com\\.looker\\.kenko\\.domain\\.model\\.toExternal', 'import com.looker.kenko.data.mapper.toExternal'; $content = $content -replace 'import com\\.looker\\.kenko\\.data\\.local\\.model\\.DefaultExercise', 'import com.looker.kenko.data.mapper.DefaultExercise'; Set-Content $_.FullName -Value $content -NoNewline; Write-Host \"Updated: $($_.FullName)\" } })"]
